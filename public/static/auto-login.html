<!DOCTYPE html><html><head><meta charset="utf-8"><title>Auto-Login</title></head>
<body><pre id="log">Logging in...</pre>
<script>
(async () => {
  const params = new URLSearchParams(location.search);
  const email = params.get('email') || 'admin@wylie.co.kr';
  const password = params.get('password') || 'admin1234';
  const next = params.get('next') || '/';
  document.getElementById('log').textContent = `Login as ${email}...`;
  const r = await fetch('/api/auth/login', {
    method: 'POST', credentials: 'include',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({email, password})
  });
  const j = await r.json();
  document.getElementById('log').textContent = JSON.stringify(j, null, 2);
  setTimeout(() => location.href = next, 400);
})();
</script></body></html>
