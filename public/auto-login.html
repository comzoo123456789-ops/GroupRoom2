<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>Auto-Login</title></head>
<body>
<pre id="log">Logging in as admin@wylie.co.kr ...</pre>
<script>
(async () => {
  const log = document.getElementById('log');
  try {
    const r = await fetch('/api/auth/login', {
      method: 'POST',
      credentials: 'include',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({email:'admin@wylie.co.kr', password:'admin1234'})
    });
    const j = await r.json();
    log.textContent = JSON.stringify(j, null, 2);
    const next = new URLSearchParams(location.search).get('next') || '/';
    setTimeout(() => location.href = next, 400);
  } catch(e) { log.textContent = 'ERROR: ' + e.message; }
})();
</script>
</body>
</html>
